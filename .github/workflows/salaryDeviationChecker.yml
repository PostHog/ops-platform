name: Salary Deviation Checker
permissions: {}
on:
  schedule:
    - cron: '*/10 14 * * *' # every 10 minutes at 2:00 PM UTC
  workflow_dispatch:

jobs:
  salaryDeviationChecker:
    runs-on: ubuntu-latest
    steps:
      - name: Call salaryDeviationChecker endpoint
        id: salaryDeviationChecker
        uses: fjogeleit/http-request-action@c0b95d02a088b47c1f2f4db04fd8af8bd19eee54 # v1
        with:
          url: '${{ vars.BASE_URL }}/salaryDeviationChecker'
          method: 'POST'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.SYNC_ENDPOINT_KEY }}"}'
          timeout: 30000
      - name: Show Response
        env:
          RESPONSE_STATUS: ${{ steps.salaryDeviationChecker.outputs.status }}
          RESPONSE_BODY: ${{ steps.salaryDeviationChecker.outputs.response }}
        run: |
          echo "$RESPONSE_STATUS"
          echo "$RESPONSE_BODY"
