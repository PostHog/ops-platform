name: Run scheduled jobs
permissions: {}
on:
  schedule:
    - cron: '*/10 12 * * 1-5' # Runs every 10 minutes, between 12:00 and 12:59 PM UTC, Monday through Friday
  workflow_dispatch:

jobs:
  runScheduledJobs:
    runs-on: ubuntu-latest
    steps:
      - name: Call runScheduledJobs endpoint
        id: runScheduledJobs
        uses: fjogeleit/http-request-action@c0b95d02a088b47c1f2f4db04fd8af8bd19eee54 # v1
        with:
          url: '${{ vars.BASE_URL }}/runScheduledJobs'
          method: 'POST'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.SYNC_ENDPOINT_KEY }}"}'
          timeout: 30000
      - name: Show Response
        run: |
          echo ${{ steps.runScheduledJobs.outputs.status }}
          echo ${{ steps.runScheduledJobs.outputs.response }}
