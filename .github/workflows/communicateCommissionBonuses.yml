name: Communicate commission bonuses
permissions: {}
on:
  workflow_dispatch:

jobs:
  communicateCommissionBonuses:
    runs-on: ubuntu-latest
    steps:
      - name: Call communicateCommissionBonuses endpoint
        id: communicateCommissionBonuses
        uses: fjogeleit/http-request-action@c0b95d02a088b47c1f2f4db04fd8af8bd19eee54 # v1
        with:
          url: '${{ vars.BASE_URL }}/communicateCommissionBonuses'
          method: 'POST'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.SYNC_ENDPOINT_KEY }}"}'
          timeout: 30000
      - name: Show Response
        env:
          RESPONSE_STATUS: ${{ steps.communicateCommissionBonuses.outputs.status }}
          RESPONSE_BODY: ${{ steps.communicateCommissionBonuses.outputs.response }}
        run: |
          echo "$RESPONSE_STATUS"
          echo "$RESPONSE_BODY"
